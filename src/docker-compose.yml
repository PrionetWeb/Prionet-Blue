version: '3.8'

services:
  priority-pay-network:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ppn.rule=Host(`prioritypaynetwork.com`)"
      - "traefik.http.routers.ppn.tls=true"
      - "traefik.http.routers.ppn.tls.certresolver=letsencrypt"

networks:
  default:
    external:
      name: web